<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klas Komponentletare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Klas Komponentletare</h1>

    <div class="card">
        <h2>Projekt</h2>

        <label>Välj Excel-fil:</label>
        <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">

        <hr>

        <button id="startCamera">Starta kamera</button>
        <button id="readNumber">Läs nummer</button>

        <div class="camera-container">
            <video id="camera" autoplay playsinline></video>

            <div class="scan-box">
                <div class="scan-text">RIKTA NUMRET HÄR</div>
            </div>
        </div>

        <canvas id="snapshot" style="display:none;"></canvas>

        <div id="ocrStatus"></div>

        <hr>

        <div id="resultat">
            Ingen fil inläst.
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
