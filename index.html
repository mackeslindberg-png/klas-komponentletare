<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klas Komponentletare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Klas Komponentletare</h1>

<div class="card">
    <h2>Projekt</h2>

    <label>Välj Excel-fil:</label>
    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">

    <br><br>

    <label>Fota/ladda upp komponentlista:</label>
    <input type="file" id="listImage" accept="image/*" capture="environment">

    <hr>

    <button id="startCamera">Starta kamera</button>
    <button id="startScan">Starta smart scan</button>
    <button id="stopScan">Stoppa scan</button>

    <p id="scanInfo">Scan: stoppad</p>

    <div class="camera-container">
        <video id="camera" autoplay playsinline></video>

        <div class="scan-box">
            <div class="scan-text">RIKTA NUMRET INOM RAMEN</div>
        </div>
    </div>

    <canvas id="snapshot" style="display:none;"></canvas>

    <div id="ocrStatus"></div>

    <hr>

    <div id="resultat">
        Ingen lista inläst.
    </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="app.js"></script>

</body>
</html>
